var cf='all', ci=-1;

function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function box(l,v){if(!v||!v.trim()||v=='null')return '';return '<div class="box"><div class="lbl">'+e(l)+'</div><div class="val">'+e(v)+'</div></div>';}
function al(c,t){if(!t)return '';return '<div class="alert '+c+'">'+t+'</div>';}

function chip(s,max){var p=s/max;var c=p>=0.7?'cr':p>=0.45?'ca':'cg';return '<span class="chip '+c+'">'+s+'/'+max+'</span>';}

function ccard(name,role,av){
  if(!name||name.indexOf('TBD')===0)return '';
  var parts=name.split('\n');var n=parts[0];var r=role||parts[1]||'';
  var rest=parts.slice(2).filter(function(x){return x.trim();}).join(' · ');
  var ini=n.split(' ').filter(function(w){return w;}).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();
  return '<div class="ccard"><div class="av '+av+'">'+ini+'</div><div><div class="cname">'+e(n)+'</div><div class="crole">'+e(r)+'</div>'+(rest?'<div class="crole" style="font-style:italic">'+e(rest)+'</div>':'')+'</div></div>';
}

function getE(name){var n=name.toUpperCase();return ENGS.filter(function(x){var a=(x.account||'').toUpperCase();return a==n||n.indexOf(a)>=0||a.indexOf(n)>=0;});}
function getFB(name){var n=name.toUpperCase();return FBS.filter(function(x){var a=(x.account||'').toUpperCase();return a==n||n.indexOf(a)>=0||a.indexOf(n)>=0;})[0]||null;}

function filt(f){
  cf=f;
  document.querySelectorAll('.btn').forEach(function(b){b.classList.remove('on');});
  var btn=document.getElementById('b-'+f);
  if(btn)btn.classList.add('on');
  render();
}

function render(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var lst=document.getElementById('lst');
  var h='';

  if(cf=='PE'){
    PE.forEach(function(p,idx){
      var nm=(p.firm||'').split('\n')[0];
      if(q&&nm.toLowerCase().indexOf(q)<0&&(p.portfolio||'').toLowerCase().indexOf(q)<0)return;
      var on=(ci===-100-idx)?' on':'';
      h+='<div class="card'+on+'" onclick="pickPE('+idx+')"><div class="cn">'+e(nm)+'</div><div class="cs">'+e((p.fund||'').substring(0,35))+'</div><span class="chip cp">PE</span></div>';
    });
    lst.innerHTML=h||'<div class="nd">No results</div>';
    return;
  }

  var items=ACCTS.filter(function(a){
    if(cf=='FR'&&a.t!='FR')return false;
    if(cf=='FZ'&&a.t!='FZ')return false;
    if(cf=='hot'&&a.score<70)return false;
    if(q){var s=(a.name+' '+(a.pe||a.parent||'')+' '+(a.trade||'')).toLowerCase();if(s.indexOf(q)<0)return false;}
    return true;
  });
  items.sort(function(a,b){return b.score-a.score;});

  items.forEach(function(a){
    var max=a.t=='FZ'?125:100;
    var on=(ci===a.i)?' on':'';
    h+='<div class="card'+on+'" onclick="pick('+a.i+')"><div class="cn">'+e(a.name)+'</div><div class="cs">'+e(a.sub)+'</div>'+chip(a.score,max)+'</div>';
  });
  lst.innerHTML=h||'<div class="nd">No results</div>';
}

  var engs=getE(a.name);var fb=getFB(a.name);

  h+='</div></div>';

  h+='<div class="tabs"><div class="tab on" id="tov" onclick="doTab(\'ov\')">Overview</div><div class="tab" id="tcx" onclick="doTab(\'cx\')">Contacts</div><div class="tab" id="tin" onclick="doTab(\'in\')">FDD Intel</div><div class="tab" id="tie" onclick="doTab(\'ie\')">Insight Engine</div><div class="tab" id="teg" onclick="doTab(\'eg\')">Engagement ('+engs.length+')</div><div class="tab" id="tpl" onclick="doTab(\'pl\')">Pipeline</div></div>';

  else{h+='<div class="stat"><div class="sv">'+(a.locations||0)+'</div><div class="sl">Locations</div></div><div class="stat"><div class="sv">'+(a.techs||0)+'</div><div class="sl">Techs</div></div><div class="stat"><div class="sv">'+a.fz+'</div><div class="sl">FZ Score</div></div><div class="stat"><div class="sv" style="color:'+scol+'">'+sc+'</div><div class="sl">Combined/125</div></div>';}

  // Contacts
  h+='<div class="pane" id="pcx">';
  if(isFR){h+=ccard(a.ceo,'CEO / President','av0')+ccard(a.cfo,'CFO','av1')+ccard(a.coo,'COO / President','av2')+ccard(a.bd,'Franchise Dev','av3');if(a.gps_exec)h+='<div class="section">GPS Insight exec contact</div>'+box('',a.gps_exec);}
  else{
    h+='<div class="section">Owner / Decision maker</div>';
    h+=(a.owner&&a.owner.indexOf('TBD')!==0)?ccard(a.owner,'','av0'):box('Owner',a.owner||'TBD');
    h+='<div class="section">Ops / Office manager</div>';
    h+=(a.ops&&a.ops.indexOf('TBD')!==0)?ccard(a.ops,'','av2'):box('Ops',a.ops||'TBD');
    h+='<div class="section">GPS Insight account rep</div>'+box('',a.gps_rep||'TBD - verify with Andrea');
    h+='<div class="g2">'+box('Telematics',a.telematics)+box('GPS Insight customer?',a.gps_customer)+'</div>';
  }
  h+='</div>';

  // FDD
  h+='<div class="pane" id="pin">'+(a.fdd&&a.fdd.trim()?box('FDD intelligence',a.fdd):'<div class="nd">No FDD data yet</div>')+'</div>';

  // Insight
  h+='<div class="pane" id="pie">'+(a.insight&&a.insight.trim()?box('Insight Engine inputs',a.insight):'<div class="nd">No Insight Engine inputs yet</div>');
  if(!isFR)h+='<div class="g3">'+box('FZ Score',a.fz+'/100')+box('Bonus',a.fb||'-')+box('Combined',sc+'/125')+'</div>';
  else h+=box('Score',sc+'/100');
  h+='</div>';

  // Engagement
  h+='<div class="pane" id="peg">';
  if(!engs.length)h+='<div class="nd">No engagement activity logged yet</div>';
  else engs.forEach(function(en){
    var hot=en.status&&(en.status.indexOf('Call')>=0||en.status.indexOf('Scheduled')>=0);
    h+='<div class="eng'+(hot?' hot':'')+'"><div class="edate">'+e(en.date)+' &middot; '+e(en.channel)+' &middot; '+e(en.type)+'</div><div class="ewho">'+e(en.contact)+' &mdash; <span style="font-weight:400">'+e(en.outcome)+'</span> <span class="chip '+(hot?'cr':'cg')+'" style="font-size:10px">'+e(en.status||'')+'</span></div>'+(en.feedback?'<div class="enote" style="color:#1a3a6b;margin-top:3px">"'+e(en.feedback)+'"</div>':'')+(en.next_step?'<div class="enxt">&#8594; '+e(en.next_step)+'</div>':'')+'</div>';
  });
  h+='</div>';

  // Pipeline
  h+='<div class="pane" id="ppl">';
  if(fb){h+='<div class="statrow"><div class="stat"><div class="sv">'+(fb.touches||0)+'</div><div class="sl">Touches</div></div><div class="stat"><div class="sv" style="font-size:13px">'+e(fb.status||'-')+'</div><div class="sl">Status</div></div><div class="stat"><div class="sv" style="font-size:13px">'+e(fb.temp||'-')+'</div><div class="sl">Temp</div></div></div>';if(fb.last_outcome)h+=box('Last outcome',fb.last_outcome);if(fb.feedback_text)h+=al('ai','<strong>Feedback:</strong> '+e(fb.feedback_text));if(fb.objections)h+=al('aw','<strong>Objections:</strong> '+e(fb.objections));if(fb.next_milestone)h+=box('Next milestone',fb.next_milestone);}
  else h+='<div class="nd">No pipeline data yet</div>';
  h+='</div>';

  h+='</div>';
  document.getElementById('right').innerHTML=h;
}

function pickPE(idx){
  ci=-100-idx;render();
  var p=PE[idx];if(!p)return;
  var nm=(p.firm||'').split('\n')[0];
  var isDont=(p.contact||'').indexOf('DO NOT')>=0;
  var h='<div class="profile"><div class="phead"><div>';
  h+='<div class="ptitle">'+e(nm)+'</div><div class="pmeta">'+e(p.fund||'')+' &middot; '+e(p.portfolio||'')+'</div>';
  h+='<div class="pbadges"><span class="chip cp">PE Firm</span>';
  if(p.priority)h+=' <span class="chip '+(p.priority.indexOf('Critical')>=0?'cr':p.priority.indexOf('High')>=0?'ca':'cg')+'">'+e(p.priority)+'</span>';
  if(p.status)h+=' <span class="chip cb">'+e(p.status)+'</span>';
  h+='</div></div></div>';
  h+='<div style="padding:18px 22px">';
  if(isDont)h+=al('ad','<strong>&#9888; DO NOT approach direct.</strong> PE intro path only.');
  if(p.next)h+=al('as','<strong>Next action:</strong> '+e(p.next));
  h+=box('Named contacts at PE firm',p.contact);
  h+=box('Deal team focal points',p.focal);
  h+=box('GPS Insight intro path',p.intro);
  h+='</div></div>';
  document.getElementById('right').innerHTML=h;
}

function doTab(id){
  var ids=['ov','cx','in','ie','eg','pl'];
  ids.forEach(function(x){
    var t=document.getElementById('t'+x);if(t)t.classList.remove('on');
    var p=document.getElementById('p'+x);if(p)p.classList.remove('on');
  });
  var t=document.getElementById('t'+id);if(t)t.classList.add('on');
  var p=document.getElementById('p'+id);if(p)p.classList.add('on');
}

document.getElementById('q').addEventListener('input',render);
render();

</script>
</body>
</html>
