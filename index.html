        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        background: #f0f2f5;
        color: #111
    }

    header {
        background: #1A2B3C;
        color: #fff;
        padding: 13px 20px;
        font-size: 15px;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between
    }

    .logo span {
        color: #4A9FE0
    }

    .meta {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4)
    }

    .wrap {
        display: flex;
        height: calc(100vh - 46px)
    }

    .left {
        width: 305px;
        flex-shrink: 0;
        background: #fff;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        overflow: hidden
    }

    .ctrl {
        padding: 10px;
        border-bottom: 1px solid #eee
    }

    .ctrl input {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
        outline: none
    }

    .ctrl input:focus {
        border-color: #185FA5
    }

    .btns {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 8px
    }

    .btn {
        padding: 4px 10px;
        border: 1px solid #ccc;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        background: #fff;
        color: #333
    }

    .btn.on {
        background: #185FA5;
        border-color: #185FA5;
        color: #fff
    }

    .list {
        overflow-y: auto;
        flex: 1;
        padding: 6px
    }

    .card {
        padding: 9px 11px;
        border-radius: 7px;
        cursor: pointer;
        margin-bottom: 3px;
        border: 1.5px solid transparent
    }

    .card:hover {
        background: #f5f7fa
    }

    .card.on {
        background: #e8f1fb;
        border-color: #185FA5
    }

    .card.on .cn {
        color: #185FA5
    }

    .cn {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 2px
    }

    .cs {
        font-size: 11px;
        color: #777;
        margin-bottom: 4px
    }

    .chip {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600
    }

    .cr {
        background: #fee2e2;
        color: #991b1b
    }

    .ca {
        background: #fef3c7;
        color: #92400e
    }

    .cg {
        background: #f3f4f6;
        color: #555
    }

    .cg2 {
        background: #d1fae5;
        color: #065f46
    }

    .cb {
        background: #dbeafe;
        color: #1e40af
    }

    .cp {
        background: #ede9fe;
        color: #5b21b6
    }

    .co {
        background: #ffedd5;
        color: #9a3412
    }

    .nd {
        color: #aaa;
        font-size: 13px;
        padding: 16px 0;
        text-align: center
    }

    .right {
        flex: 1;
        padding: 20px;
        overflow-y: auto
    }

    .empty {
        text-align: center;
        padding-top: 100px;
        color: #aaa
    }

    .empty h2 {
        font-size: 18px;
        margin-bottom: 8px;
        color: #555
    }

    .profile {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        overflow: hidden;
        max-width: 920px
    }

    .phead {

        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px

    .ptitle {
        font-size: 20px;
        font-weight: 700;
        color: #1A2B3C;
        margin-bottom: 4px
    }

    .pmeta {
        font-size: 12px;
        color: #777;
        margin-bottom: 8px
    }

    .pbadges {
        display: flex;
        gap: 5px;
        flex-wrap: wrap
    }

    .pscore {
        text-align: right;
        flex-shrink: 0
    }

    .snum {
        font-size: 30px;
        font-weight: 700;
        line-height: 1
    }

    .slbl {
        font-size: 11px;
        color: #888;
        margin-top: 2px
    }

    .sflag {
        font-size: 10px;
        color: #555;
        margin-top: 3px;
        font-weight: 600
    }

        background: #fafafa;
        border-bottom: 1px solid #eee;
        overflow-x: auto
    }

    .tab {
        padding: 10px 16px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        color: #777;
        border-bottom: 2px solid transparent;
        font-weight: 500

    .tab:hover {
        color: #333
    }

    .tab.on {
        color: #185FA5;
        border-bottom-color: #185FA5;
        background: #fff
    }

    .pane {
        padding: 18px 22px;
        display: none
    }

    .pane.on {
        display: block
    }

        font-size: 11px;
        font-weight: 600;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin: 14px 0 7px

        margin-top: 0
    }

        border: 1px solid #eee;
        border-radius: 7px;
        padding: 10px 12px;
        margin-bottom: 8px
    }

    .lbl {
        font-size: 11px;
        color: #999;
        margin-bottom: 3px
    }

    .val {

        color: #222;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5
    }

    .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px
    }

    .g3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px
    }

        border-radius: 7px;

        margin-bottom: 8px;
        font-size: 13px;
        border-left: 3px solid;
        line-height: 1.5

    }

        border: 1px solid #eee;
        border-radius: 7px;
        padding: 11px;
        margin-bottom: 7px

        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0

        background: #1A2B3C;
        color: #fff
    }

    .av1 {
        background: #dbeafe;
        color: #1e40af
    }

    .av2 {
        background: #d1fae5;
        color: #065f46
    }

    .av3 {
        background: #f3f4f6;
        color: #333
    }

        font-weight: 600;
        color: #1A2B3C;
        margin-bottom: 2px
    }

    .crole {
        font-size: 11px;
        color: #777;
        line-height: 1.4
    }

    .statrow {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 14px
    }

    .stat {
        background: #f9fafb;

        border-radius: 7px;
        padding: 10px;
        text-align: center
    }

        font-size: 20px;
        font-weight: 700;
        color: #1A2B3C
    }

        font-size: 11px;
        color: #aaa;
        margin-top: 2px
    }

        margin-bottom: 10px

    .eng.hot {

    }

    .edate {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 3px
    }

    .ewho {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 3px
    }

    .enote {
        font-size: 12px;
        white-space: pre-wrap;
        line-height: 1.5
    }

    .enxt {
        font-size: 12px;
        color: #185FA5;
        margin-top: 4px;
        font-style: italic
    }

    .scoretable {
        width: 100%;
        font-size: 12px;
        border-collapse: collapse;
        margin-top: 6px
    }

    .scoretable td {
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
        vertical-align: top
    }

    .scoretable td:first-child {
        font-weight: 600;
        width: 35%;
        color: #555
    }

    .scoretable td:nth-child(2) {
        font-weight: 700;
        color: #185FA5;
        width: 18%;
        white-space: nowrap
    }

        color: #777;
        font-size: 11px

        .wrap {

        }

    var cf = 'all',
        ci = -1;

    function e(s) {
        return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function box(l, v) {
        if (!v || !String(v).trim() || v == 'null')
            return '';
        return '<div class="box"><div class="lbl">' + e(l) + '</div><div class="val">' + e(String(v)) + '</div></div>';
    }
    function al(c, t) {
        if (!t)
            return '';
        return '<div class="alert ' + c + '">' + t + '</div>';
    }

    function chip(s, max) {
        var p = s / max;
        var c = p >= 0.7 ? 'cr' : p >= 0.45 ? 'ca' : 'cg';
        return '<span class="chip ' + c + '">' + s + '/' + max + '</span>';
    }

    function ccard(name, role, av) {
        if (!name || name.indexOf('TBD') === 0)
            return '';
        var parts = String(name).split('\n');
        var n = parts[0];
        var r = role || parts[1] || '';
        var rest = parts.slice(2).filter(function(x) {
            return x.trim();
        }).join(' · ');
        var ini = n.split(' ').filter(function(w) {
            return w;
        }).slice(0, 2).map(function(w) {
            return w[0] || '';
        }).join('').toUpperCase();
        return '<div class="ccard"><div class="av ' + av + '">' + ini + '</div><div><div class="cname">' + e(n) + '</div><div class="crole">' + e(r) + '</div>' + (rest ? '<div class="crole" style="font-style:italic">' + e(rest) + '</div>' : '') + '</div></div>';
    }

    function getE(name) {
        var n = name.toUpperCase();
        return ENGS.filter(function(x) {
            var a = (x.account || '').toUpperCase();
            return a == n || n.indexOf(a) >= 0 || a.indexOf(n) >= 0;
        });
    }
    function getFB(name) {
        var n = name.toUpperCase();
        return FBS.filter(function(x) {
                var a = (x.account || '').toUpperCase();
                return a == n || n.indexOf(a) >= 0 || a.indexOf(n) >= 0;
            })[0] || null;
    }

    function filt(f) {
        cf = f;
        document.querySelectorAll('.btn').forEach(function(b) {
            b.classList.remove('on');
        });
        var btn = document.getElementById('b-' + f);
        if (btn)
            btn.classList.add('on');
        render();
    }

    function render() {
        var q = (document.getElementById('q').value || '').toLowerCase().trim();
        var lst = document.getElementById('lst');
        var h = '';

        if (cf == 'PE') {
            PE.forEach(function(p, idx) {
                var nm = (p.firm || '').split('\n')[0];
                if (q && nm.toLowerCase().indexOf(q) < 0 && (p.portfolio || '').toLowerCase().indexOf(q) < 0)
                    return;
                var on = (ci === -100 - idx) ? ' on' : '';
                var priochip = p.priority && p.priority.indexOf('Critical') >= 0 ? 'cr' : p.priority && p.priority.indexOf('High') >= 0 ? 'ca' : 'cp';
                h += '<div class="card' + on + '" onclick="pickPE(' + idx + ')"><div class="cn">' + e(nm) + '</div><div class="cs">' + e((p.fund || '').split('\n')[0].substring(0, 40)) + '</div><span class="chip ' + priochip + '">' + e(p.priority || 'PE') + '</span></div>';
            });
            lst.innerHTML = h || '<div class="nd">No results</div>';
            return;
        }

        if (cf == 'CP') {
            COMPS.forEach(function(c, idx) {
                if (q && (c.name || '').toLowerCase().indexOf(q) < 0 && (c.category || '').toLowerCase().indexOf(q) < 0)
                    return;
                var on = (ci === -200 - idx) ? ' on' : '';
                var nm = (c.name || '').split('\n')[0];
                var prio = c.priority || '';
                var pc = prio.indexOf('#1') >= 0 || prio.indexOf('HIGH') >= 0 ? 'cr' : prio.indexOf('WATCH') >= 0 ? 'ca' : 'cg2';
                h += '<div class="card' + on + '" onclick="pickCP(' + idx + ')"><div class="cn">' + e(nm) + '</div><div class="cs">' + e(c.category || '') + '</div><span class="chip ' + pc + '">' + e(prio.substring(0, 20)) + '</span></div>';
            });
            lst.innerHTML = h || '<div class="nd">No results</div>';
            return;
        }

        if (cf == 'EV') {
            EVENTS.forEach(function(v, idx) {
                if (q && (v.name || '').toLowerCase().indexOf(q) < 0 && (v.location || '').toLowerCase().indexOf(q) < 0)
                    return;
                var on = (ci === -300 - idx) ? ' on' : '';
                var st = v.status || '';
                var sc = st.indexOf('Occurred') >= 0 ? 'cg' : st.indexOf('Upcoming') >= 0 ? 'cg2' : 'co';
                h += '<div class="card' + on + '" onclick="pickEV(' + idx + ')"><div class="cn">' + e((v.name || '').substring(0, 50)) + '</div><div class="cs">' + e(v.date || '') + ' &middot; ' + e((v.location || '').substring(0, 30)) + '</div><span class="chip ' + sc + '">' + e(st) + '</span></div>';
            });
            lst.innerHTML = h || '<div class="nd">No results</div>';
            return;
        }

        if (cf == 'A250') {
            var sections = [
            {
                key: 'overview',
                title: 'Campaign Overview',
                icon: '&#127482;&#127480;'
            },
            {
                key: 'letters',
                title: 'Handwritten Letter Campaign',
                icon: '&#9993;&#65039;'
            },
            {
                key: 'coin',
                title: 'Challenge Coin v18 (LOCKED)',
                icon: '&#129689;'
            },
            {
                key: 'linkedin',
                title: 'LinkedIn Campaign',
                icon: '&#128188;'
            },
            {
                key: 'events',
                title: 'Events & Activations',
                icon: '&#128205;'
            }
            ];
            sections.forEach(function(s, idx) {
                if (q && s.title.toLowerCase().indexOf(q) < 0)
                    return;
                var on = (ci === -400 - idx) ? ' on' : '';
                h += '<div class="card' + on + '" onclick="pickA250(' + idx + ')"><div class="cn">' + s.icon + ' ' + e(s.title) + '</div><div class="cs">' + A250[s.key].length + ' items</div></div>';
            });
            lst.innerHTML = h || '<div class="nd">No results</div>';
            return;
        }

        var items = ACCTS.filter(function(a) {
            if (cf == 'FR' && a.t != 'FR')
                return false;
            if (cf == 'FZ' && a.t != 'FZ')
                return false;
            if (cf == 'hot' && a.score < 70)
                return false;
            if (q) {
                var s = (a.name + ' ' + (a.pe || a.parent || '') + ' ' + (a.trade || '')).toLowerCase();
                if (s.indexOf(q) < 0)
                    return false;
            }
            return true;
        });
        items.sort(function(a, b) {
            return b.score - a.score;
        });

        items.forEach(function(a) {
            var max = a.t == 'FZ' ? 125 : 100;
            var on = (ci === a.i) ? ' on' : '';
            h += '<div class="card' + on + '" onclick="pick(' + a.i + ')"><div class="cn">' + e(a.name) + '</div><div class="cs">' + e(a.sub) + '</div>' + chip(a.score, max) + '</div>';
        });
        lst.innerHTML = h || '<div class="nd">No results</div>';
    }

    function pick(i) {
        ci = i;
        render();
        var a = ACCTS[i];
        if (!a)
            return;
        var engs = getE(a.name);
        var fb = getFB(a.name);
        var isFR = (a.t == 'FR');
        var max = isFR ? 100 : 125;
        var sc = a.score;
        var scol = sc >= 70 ? '#065f46' : sc >= 45 ? '#92400e' : '#555';
        var h = '<div class="profile">';
        h += '<div class="phead"><div style="flex:1">';
        h += '<div class="ptitle">' + e(a.name) + '</div>';
        h += '<div class="pmeta">' + (isFR ? e(a.pe || '') + ' &middot; ' + e(a.tier || '') + ' &middot; ' + (a.brands || 0) + ' brands &middot; ' + ((a.techs || 0).toLocaleString()) + ' techs' : e(a.parent || '') + ' &middot; ' + e(a.trade || '') + ' &middot; ' + (a.locations || 0) + ' locs &middot; ' + (a.techs || 0) + ' techs/loc') + '</div>';
        h += '<div class="pbadges">';
        if (a.fsm) {
            var fl = a.fsm.toLowerCase();
            h += '<span class="chip ' + (fl.indexOf('green') >= 0 || fl.indexOf('paper') >= 0 ? 'cg2' : fl.indexOf('mandated') >= 0 ? 'cr' : 'ca') + '">' + e(a.fsm) + '</span>';
        }
        if (a.eng_status)
            h += '<span class="chip cb">' + e(a.eng_status) + '</span>';
        if (a.status)
            h += '<span class="chip cb">' + e(a.status) + '</span>';
        if (!isFR && a.pilot)
            h += '<span class="chip cg2">' + e(a.pilot) + ' pilot</span>';
        if (!isFR && a.conflict)
            h += '<span class="chip ' + (a.conflict.indexOf('High') >= 0 ? 'cr' : a.conflict.indexOf('Med') >= 0 ? 'ca' : 'cg2') + '">' + e(a.conflict) + '</span>';
        if (fb && fb.temp)
            h += '<span class="chip ' + (fb.temp.indexOf('Hot') >= 0 ? 'cr' : fb.temp.indexOf('Warm') >= 0 || fb.temp.indexOf('Action') >= 0 ? 'ca' : 'cg') + '">' + e(fb.temp) + '</span>';
        h += '</div></div>';
        h += '<div class="pscore"><div class="snum" style="color:' + scol + '">' + sc + '</div><div class="slbl">/ ' + max + '</div>' + ((!isFR && a.fb) ? '<div class="slbl">' + e(a.fb) + ' bonus</div>' : '') + (a.score_flag ? '<div class="sflag">' + e(a.score_flag) + '</div>' : '') + '</div></div>';

        h += '<div class="tabs"><div class="tab on" id="tov" onclick="doTab(\'ov\')">Overview</div><div class="tab" id="tcx" onclick="doTab(\'cx\')">Contacts</div><div class="tab" id="tin" onclick="doTab(\'in\')">FDD Intel</div><div class="tab" id="tie" onclick="doTab(\'ie\')">Insight Engine</div><div class="tab" id="tsc" onclick="doTab(\'sc\')">Score Breakdown</div><div class="tab" id="teg" onclick="doTab(\'eg\')">Engagement (' + engs.length + ')</div><div class="tab" id="tpl" onclick="doTab(\'pl\')">Pipeline</div></div>';

        // Overview
        h += '<div class="pane on" id="pov">';
        if (fb && fb.next_milestone)
            h += al('ai', '<strong>Next milestone:</strong> ' + e(fb.next_milestone));
        if (a.next_step)
            h += al('as', '<strong>Next action:</strong> ' + e(a.next_step) + (a.next_date ? ' &middot; ' + e(a.next_date) : ''));
        if ((a.fsm && a.fsm.toLowerCase().indexOf('mandated') >= 0) || (a.conflict && a.conflict.indexOf('High') >= 0))
            h += al('ad', '<strong>Conflict risk</strong> &mdash; ' + e(a.conflict || a.fsm) + (a.current_fsm ? ' &middot; ' + e(a.current_fsm) : ''));
        h += '<div class="statrow">';
        if (isFR) {
            h += '<div class="stat"><div class="sv">' + (a.brands || 0) + '</div><div class="sl">Brands</div></div><div class="stat"><div class="sv">' + ((a.techs || 0).toLocaleString()) + '</div><div class="sl">Techs</div></div><div class="stat"><div class="sv">' + e(a.arr || '-') + '</div><div class="sl">ARR Est.</div></div><div class="stat"><div class="sv" style="color:' + scol + '">' + sc + '</div><div class="sl">Score/100</div></div>';
        }
        else {
            h += '<div class="stat"><div class="sv">' + (a.locations || 0) + '</div><div class="sl">Locations</div></div><div class="stat"><div class="sv">' + (a.techs || 0) + '</div><div class="sl">Techs/Loc</div></div><div class="stat"><div class="sv">' + a.fz + '</div><div class="sl">FZ Score</div></div><div class="stat"><div class="sv" style="color:' + scol + '">' + sc + '</div><div class="sl">Combined/125</div></div>';
        }
        h += '</div>';
        h += '<div class="g2">' + box(isFR ? 'PE Backer' : 'Parent', isFR ? a.pe : a.parent) + box('Notes', a.notes) + '</div>';
        if (a.insurance_carrier)
            h += box('Insurance carrier / program', a.insurance_carrier);
        if (a.insurance)
            h += box('Insurance GTM angle', a.insurance);
        if (a.convention)
            h += box('Convention / events', a.convention);
        if (a.vendors_invited)
            h += box('Vendors/partners invited?', a.vendors_invited);
        if (a.gps_support)
            h += box('GPS Insight intro path', a.gps_support);
        h += '</div>';

        // Contacts
        h += '<div class="pane" id="pcx">';
        if (isFR) {
            h += ccard(a.ceo, 'CEO / President', 'av0')
            + ccard(a.cfo, 'CFO', 'av1')
            + ccard(a.coo, 'COO / President', 'av2')
            + ccard(a.bd, 'Franchise Dev', 'av3');
            if (a.gps_exec)
                h += '<div class="section">GPS Insight exec contact</div>' + box('', a.gps_exec);
        } else {
            if (a.primary_contact)
                h += '<div class="section">Primary contact</div>' + box(a.contact_title || '', a.primary_contact);
            h += '<div class="section">Owner / Decision maker</div>';
            h += (a.owner && a.owner.indexOf('TBD') !== 0) ? ccard(a.owner, '', 'av0') : box('Owner', a.owner || 'TBD');
            h += '<div class="section">Ops / Office manager</div>';
            h += (a.ops && a.ops.indexOf('TBD') !== 0) ? ccard(a.ops, '', 'av2') : box('Ops', a.ops || 'TBD');
            h += '<div class="section">GPS Insight account rep</div>' + box('', a.gps_rep || 'TBD - verify with Andrea');
            h += '<div class="g2">' + box('Telematics', a.telematics) + box('GPS Insight customer?', a.gps_customer) + '</div>';
            if (a.current_fsm)
                h += box('Current FSM platform', a.current_fsm);
            if (a.gps_warm)
                h += box('GPS warm flag', a.gps_warm);
        }
        h += '</div>';

        // FDD
        h += '<div class="pane" id="pin">' + (a.fdd && String(a.fdd).trim() ? box('FDD intelligence', a.fdd) : '<div class="nd">No FDD data yet</div>') + '</div>';

        // Insight
        h += '<div class="pane" id="pie">' + (a.insight && String(a.insight).trim() ? box('Insight Engine inputs', a.insight) : '<div class="nd">No Insight Engine inputs yet</div>') + '</div>';

        // Score breakdown (new tab)
        h += '<div class="pane" id="psc">';
        if (isFR) {
            h += '<div class="section">Franchisor scoring breakdown</div>';
            h += '<table class="scoretable">';
            if (a.score_fsm)
                h += '<tr><td>FSM Status</td><td>' + e(a.score_fsm.split("\n")[0]) + '</td><td>' + e(a.score_fsm.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_network)
                h += '<tr><td>Network Size</td><td>' + e(a.score_network.split("\n")[0]) + '</td><td>' + e(a.score_network.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_pe)
                h += '<tr><td>PE Exit Window</td><td>' + e(a.score_pe.split("\n")[0]) + '</td><td>' + e(a.score_pe.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_fdd)
                h += '<tr><td>FDD Intel</td><td>' + e(a.score_fdd.split("\n")[0]) + '</td><td>' + e(a.score_fdd.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_access)
                h += '<tr><td>Contact Accessibility</td><td>' + e(a.score_access.split("\n")[0]) + '</td><td>' + e(a.score_access.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_warm)
                h += '<tr><td>GPS Warm Flag</td><td>' + e(a.score_warm.split("\n")[0]) + '</td><td>' + e(a.score_warm.split("\n").slice(1).join(" ")) + '</td></tr>';
            if (a.score_pilot)
                h += '<tr><td>Pilot Fit</td><td>' + e(a.score_pilot.split("\n")[0]) + '</td><td>' + e(a.score_pilot.split("\n").slice(1).join(" ")) + '</td></tr>';
            h += '<tr style="border-top:2px solid #1A2B3C"><td><strong>TOTAL</strong></td><td style="font-size:16px">' + sc + '/100</td><td>' + e(a.score_flag || '') + '</td></tr>';
            h += '</table>';
        } else {
            h += '<div class="g3">' + box('FZ Score', a.fz + '/100') + box('Franchisor Bonus', a.fb || '-') + box('Combined', sc + '/125') + '</div>';
            if (a.score_flag)
                h += al('ai', '<strong>Status:</strong> ' + e(a.score_flag));
        }
        h += '</div>';

        // Engagement
        h += '<div class="pane" id="peg">';
        if (!engs.length)
            h += '<div class="nd">No engagement activity logged yet</div>';
        else
            engs.forEach(function(en) {
                var hot = en.status && (en.status.indexOf('Call') >= 0 || en.status.indexOf('Scheduled') >= 0 || en.status.indexOf('Hot') >= 0);
                h += '<div class="eng' + (hot ? ' hot' : '') + '"><div class="edate">' + e(en.date) + ' &middot; ' + e(en.channel) + ' &middot; ' + e(en.type) + (en.track ? ' &middot; ' + e(en.track) : '') + '</div><div class="ewho">' + e(en.contact) + (en.title ? ' <span style="font-weight:400;font-size:11px;color:#777">(' + e(en.title) + ')</span>' : '') + ' &mdash; <span style="font-weight:400">' + e(en.outcome) + '</span> <span class="chip ' + (hot ? 'cr' : 'cg') + '" style="font-size:10px">' + e(en.status || '') + '</span></div>' + (en.feedback ? '<div class="enote" style="color:#1a3a6b;margin-top:3px">"' + e(en.feedback) + '"</div>' : '') + (en.objections ? '<div class="enote" style="color:#7a3500;margin-top:3px"><strong>Objection:</strong> ' + e(en.objections) + '</div>' : '') + (en.gps_action ? '<div class="enote" style="color:#555;margin-top:3px">GPS: ' + e(en.gps_action) + '</div>' : '') + (en.next_step ? '<div class="enxt">&#8594; ' + e(en.next_step) + (en.next_date ? ' (' + e(en.next_date) + ')' : '') + '</div>' : '') + '</div>';
            });
        h += '</div>';

        // Pipeline
        h += '<div class="pane" id="ppl">';
        if (fb) {
            h += '<div class="statrow"><div class="stat"><div class="sv">' + (fb.touches || 0) + '</div><div class="sl">Touches</div></div><div class="stat"><div class="sv" style="font-size:13px">' + e(fb.status || '-') + '</div><div class="sl">Status</div></div><div class="stat"><div class="sv" style="font-size:13px">' + e(fb.temp || '-') + '</div><div class="sl">Temp</div></div><div class="stat"><div class="sv" style="font-size:13px">' + e(fb.last_contact || '-') + '</div><div class="sl">Last Contact</div></div></div>';
            if (fb.last_outcome)
                h += box('Last outcome', fb.last_outcome);
            if (fb.feedback_text)
                h += al('ai', '<strong>Feedback:</strong> ' + e(fb.feedback_text));
            if (fb.objections)
                h += al('aw', '<strong>Objections:</strong> ' + e(fb.objections));
            if (fb.next_milestone)
                h += box('Next milestone', fb.next_milestone);
        } else
            h += '<div class="nd">No pipeline data yet</div>';
        h += '</div>';

        h += '</div>';
        document.getElementById('right').innerHTML = h;
    }

    function pickPE(idx) {
        ci = -100 - idx;
        render();
        var p = PE[idx];
        if (!p)
            return;
        var nm = (p.firm || '').split('\n')[0];
        var isDont = (p.contact || '').indexOf('DO NOT') >= 0 || (p.focal || '').indexOf('DO NOT') >= 0;
        var h = '<div class="profile"><div class="phead"><div>';
        h += '<div class="ptitle">' + e(nm) + '</div><div class="pmeta">' + e((p.fund || '').replace(/\n/g, ' &middot; ')) + ' &middot; ' + e(p.portfolio || '') + '</div>';
        h += '<div class="pbadges"><span class="chip cp">PE Firm</span>';
        if (p.priority)
            h += ' <span class="chip ' + (p.priority.indexOf('Critical') >= 0 ? 'cr' : p.priority.indexOf('High') >= 0 ? 'ca' : 'cg') + '">' + e(p.priority) + '</span>';
        if (p.status)
            h += ' <span class="chip cb">' + e(p.status) + '</span>';
        h += '</div></div></div>';
        h += '<div style="padding:18px 22px">';
        if (isDont)
            h += al('ad', '<strong>&#9888; DO NOT approach direct.</strong> PE intro path only.');
        if (p.next)
            h += al('as', '<strong>Next action:</strong> ' + e(p.next));
        h += box('Named contacts at PE firm', p.contact);
        if (p.focal)
            h += box('Deal team focal points', p.focal);
        h += box('GPS Insight intro path', p.intro);
        if (p.gps_owner)
            h += box('GPS Insight owner', p.gps_owner);

        // Related PE actions
        var related = PE_ACTIONS.filter(function(x) {
            var f = (x.for_account || '').toLowerCase();
            return f.indexOf(nm.toLowerCase()) >= 0 || nm.toLowerCase().indexOf((x.for_account || '').split('\n')[0].toLowerCase()) >= 0;
        });
        if (related.length) {
            h += '<div class="section">Related GPS asks</div>';
            related.forEach(function(x) {
                h += '<div class="eng hot"><div class="edate">' + e(x.week) + ' &middot; ' + e(x.gps_contact) + ' &middot; ' + e(x.urgency) + '</div><div class="enote">' + e(x.ask) + '</div><div class="enxt">Status: ' + e(x.status) + '</div></div>';
            });
        }
        h += '</div></div>';
        document.getElementById('right').innerHTML = h;
    }

    function pickCP(idx) {
        ci = -200 - idx;
        render();
        var c = COMPS[idx];
        if (!c)
            return;
        var nm = (c.name || '').split('\n')[0];
        var h = '<div class="profile"><div class="phead"><div>';
        h += '<div class="ptitle">' + e(nm) + '</div><div class="pmeta">' + e(c.category || '') + '</div>';
        h += '<div class="pbadges"><span class="chip co">Competitor</span>';
        if (c.priority)
            h += ' <span class="chip ' + (c.priority.indexOf('#1') >= 0 || c.priority.indexOf('HIGH') >= 0 ? 'cr' : c.priority.indexOf('WATCH') >= 0 ? 'ca' : 'cg2') + '">' + e(c.priority) + '</span>';
        h += '</div></div></div>';
        h += '<div style="padding:18px 22px">';
        if (c.counter)
            h += al('as', '<strong>ServiceBridge counter:</strong> ' + e(c.counter));
        if (c.weakness)
            h += al('aw', '<strong>Weakness / vulnerability:</strong> ' + e(c.weakness));
        h += box('Target segment', c.target);
        h += box('Primary messaging', c.messaging);
        h += box('Key claims (verbatim / near)', c.claims);
        h += box('Franchise strategy', c.franchise_strat);
        h += box('Known accounts (mandated)', c.known_accounts);
        h += box('Pricing signal', c.pricing);
        h += box('Marketing channels', c.marketing);
        h += '<div class="g2">' + box('Last updated', c.updated) + box('Source', c.source) + '</div>';
        h += '</div></div>';
        document.getElementById('right').innerHTML = h;
    }

    function pickEV(idx) {
        ci = -300 - idx;
        render();
        var v = EVENTS[idx];
        if (!v)
            return;
        var h = '<div class="profile"><div class="phead"><div>';
        h += '<div class="ptitle">' + e(v.name || '') + '</div><div class="pmeta">' + e(v.type || '') + ' &middot; ' + e(v.date || '') + ' &middot; ' + e(v.location || '') + '</div>';
        h += '<div class="pbadges">';
        if (v.status)
            h += '<span class="chip ' + (v.status.indexOf('Occurred') >= 0 ? 'cg' : v.status.indexOf('Upcoming') >= 0 ? 'cg2' : 'co') + '">' + e(v.status) + '</span>';
        if (v.priority)
            h += ' <span class="chip ' + (v.priority.indexOf('High') >= 0 ? 'cr' : v.priority.indexOf('Medium') >= 0 ? 'ca' : 'cg') + '">' + e(v.priority) + '</span>';
        h += '</div></div></div>';
        h += '<div style="padding:18px 22px">';
        if (v.opportunity)
            h += al('as', '<strong>Your opportunity:</strong> ' + e(v.opportunity));
        h += box('Key contact attending', v.contact);
        h += box('Their role', v.role);
        h += box('Topic / notes', v.topic);
        h += box('Notes / intel', v.notes);
        h += '</div></div>';
        document.getElementById('right').innerHTML = h;
    }


    function pickA250(idx) {
        ci = -400 - idx;
        render();
        var sections = [
        {
            key: 'overview',
            title: 'Campaign Overview',
            icon: '&#127482;&#127480;',
            color: '#991b1b'
        },
        {
            key: 'letters',
            title: 'Handwritten Letter Campaign',
            icon: '&#9993;&#65039;',
            color: '#1e40af'
        },
        {
            key: 'coin',
            title: 'Challenge Coin v18 (LOCKED)',
            icon: '&#129689;',
            color: '#5b21b6',
            showImage: true
        },
        {
            key: 'linkedin',
            title: 'LinkedIn Campaign',
            icon: '&#128188;',
            color: '#065f46'
        },
        {
            key: 'events',
            title: 'Events & Activations',
            icon: '&#128205;',
            color: '#92400e'
        }
        ];
        var s = sections[idx];
        var items = A250[s.key];
        var h = '<div class="profile"><div class="phead"><div>';
        h += '<div class="ptitle">' + s.icon + ' ' + e(s.title) + '</div>';
        h += '<div class="pmeta">America 250 Campaign &middot; Built to Last — 250 Years of American Trades</div>';
        h += '<div class="pbadges"><span class="chip cr">&#127482;&#127480; America 250</span>';
        if (s.key == 'coin')
            h += ' <span class="chip cg2">v18 FINAL &middot; LOCKED</span>';
        h += '</div></div></div>';
        h += '<div style="padding:18px 22px">';
        if (s.showImage && A250.coin_image_b64) {
            h += '<div style="background:#0a1220;border-radius:8px;padding:16px;margin-bottom:14px;text-align:center">';
            h += '<img src="data:image/png;base64,' + A250.coin_image_b64 + '" style="max-width:100%;height:auto;border-radius:4px" alt="Challenge Coin v18 FINAL - Front and Back">';
            h += '<div style="color:#aaa;font-size:11px;margin-top:8px">Challenge Coin v18 FINAL &middot; Front (left) &middot; Back (right)</div>';
            h += '</div>';
        }
        items.forEach(function(it) {
            var label = it.label.replace(/\n/g, ' &middot; ');
            h += '<div class="box"><div class="lbl" style="font-weight:700;color:' + s.color + ';font-size:12px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px">' + e(label) + '</div><div class="val">' + e(it.body) + '</div></div>';
        });
        h += '</div></div>';
        document.getElementById('right').innerHTML = h;
    }

    function doTab(id) {
        var ids = ['ov', 'cx', 'in', 'ie', 'sc', 'eg', 'pl'];
        ids.forEach(function(x) {
            var t = document.getElementById('t' + x);
            if (t)
                t.classList.remove('on');
            var p = document.getElementById('p' + x);
            if (p)
                p.classList.remove('on');
        });
        var t = document.getElementById('t' + id);
        if (t)
            t.classList.add('on');
        var p = document.getElementById('p' + id);
        if (p)
            p.classList.add('on');
    }

    document.getElementById('q').addEventListener('input', render);
    render();
    </script>
</body>
